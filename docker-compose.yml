services:
  app:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    container_name: laravel_crm_app
    ports:
      - "8080:80"
    volumes:
      - ./laravel:/var/www/html
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: crm
      DB_USERNAME: root
      DB_PASSWORD: root
    depends_on:
      - db
    networks:
      - crm_network

  db:
    image: mysql:8.0
    container_name: laravel_crm_db
    restart: always
    environment:
      MYSQL_DATABASE: crm
      MYSQL_ROOT_PASSWORD: root
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - crm_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: laravel_crm_phpmyadmin
    restart: always
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root
    ports:
      - "8081:80"
    depends_on:
      - db
    networks:
      - crm_network

networks:
  crm_network:
    driver: bridge

volumes:
  db_data: